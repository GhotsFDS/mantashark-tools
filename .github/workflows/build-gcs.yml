name: Build MSK GCS EXE

on:
  push:
    branches: [main]
    paths:
      - 'tools/ground_station/msk_gcs.py'
      - '.github/workflows/build-gcs.yml'
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymavlink pyserial pyinstaller MAVProxy prompt_toolkit wcwidth wxpython lxml

      - name: Build GCS
        run: |
          cd tools/ground_station
          pyinstaller --onefile `
            --name msk_gcs `
            --hidden-import pymavlink.dialects.v20.ardupilotmega `
            --collect-submodules pymavlink `
            --collect-submodules serial `
            --noconfirm `
            msk_gcs.py

      - name: Build MAVProxy
        run: |
          cd tools/ground_station
          $mp = python -c "import MAVProxy, os; print(os.path.dirname(MAVProxy.__file__))"
          Write-Host "MAVProxy path: $mp"
          pyinstaller --onefile `
            --name mavproxy `
            --collect-all MAVProxy `
            --collect-all pymavlink `
            --collect-all prompt_toolkit `
            --collect-all wcwidth `
            --collect-all wx `
            --collect-submodules serial `
            --hidden-import pymavlink.dialects.v20.ardupilotmega `
            --hidden-import pymavlink.dialects.v20.all `
            --hidden-import MAVProxy.modules.lib `
            --hidden-import MAVProxy.mavproxy `
            --hidden-import wx `
            --hidden-import lxml `
            --hidden-import lxml.etree `
            --hidden-import pkg_resources `
            --noconfirm `
            "$mp\mavproxy.py"

      - name: Verify build
        env:
          PYTHONIOENCODING: utf-8
        run: |
          cd tools/ground_station
          dir dist
          foreach ($name in @("msk_gcs", "mavproxy")) {
            if (Test-Path "dist\$name.exe") {
              $size = (Get-Item "dist\$name.exe").Length / 1MB
              Write-Host ("OK $name.exe: {0:N1} MB" -f $size)
            } else {
              throw "$name.exe not found"
            }
          }

      - name: Package bundle
        run: |
          cd tools/ground_station
          mkdir dist\msk_gcs_bundle
          copy dist\msk_gcs.exe dist\msk_gcs_bundle\
          copy dist\mavproxy.exe dist\msk_gcs_bundle\
          copy README.md dist\msk_gcs_bundle\ -ErrorAction SilentlyContinue
          copy FIELD_README.md dist\msk_gcs_bundle\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\msk_gcs_bundle\* -DestinationPath dist\msk_gcs-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: msk_gcs-windows
          path: tools/ground_station/dist/msk_gcs-windows.zip
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: tools/ground_station/dist/msk_gcs-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymavlink pyserial pyinstaller MAVProxy prompt_toolkit wcwidth wxpython lxml

      - name: Build GCS
        run: |
          cd tools/ground_station
          pyinstaller --onefile \
            --name msk_gcs \
            --hidden-import pymavlink.dialects.v20.ardupilotmega \
            --collect-submodules pymavlink \
            --collect-submodules serial \
            --noconfirm \
            msk_gcs.py

      - name: Build MAVProxy
        run: |
          cd tools/ground_station
          MP=$(python -c "import MAVProxy, os; print(os.path.dirname(MAVProxy.__file__))")
          pyinstaller --onefile \
            --name mavproxy \
            --collect-all MAVProxy \
            --collect-all pymavlink \
            --collect-all prompt_toolkit \
            --collect-all wcwidth \
            --collect-all wx \
            --collect-submodules serial \
            --hidden-import pymavlink.dialects.v20.ardupilotmega \
            --hidden-import pymavlink.dialects.v20.all \
            --hidden-import MAVProxy.modules.lib \
            --hidden-import wx \
            --hidden-import lxml \
            --hidden-import lxml.etree \
            --hidden-import MAVProxy.mavproxy \
            --hidden-import pkg_resources \
            --noconfirm \
            "$MP/mavproxy.py"

      - name: Package bundle
        run: |
          cd tools/ground_station
          mkdir -p dist/msk_gcs_bundle
          cp dist/msk_gcs dist/msk_gcs_bundle/
          cp dist/mavproxy dist/msk_gcs_bundle/
          cp README.md dist/msk_gcs_bundle/ || true
          cp FIELD_README.md dist/msk_gcs_bundle/ || true
          cd dist && tar -czf msk_gcs-linux.tar.gz -C msk_gcs_bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: msk_gcs-linux
          path: tools/ground_station/dist/msk_gcs-linux.tar.gz
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: tools/ground_station/dist/msk_gcs-linux.tar.gz
